<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Рейтинги политических партий — mobile</title>
    <script src="plotly-2.30.0.min.js" onerror="(function(){var s=document.createElement('script');s.src='https://cdn.plot.ly/plotly-2.30.0.min.js';document.head.appendChild(s);})();"></script>
    <script src="political_parties_payload.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1220;
        --panel: #101a2f;
        --text: #e6edf7;
        --muted: #9bb0d0;
        --border: rgba(255, 255, 255, 0.12);
        --accent: #7aa2ff;
        --danger: #ff6b6b;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
      }

      .app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .grow {
        flex: 1;
      }

      button {
        -webkit-tap-highlight-color: transparent;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 12px;
        padding: 9px 10px;
        cursor: pointer;
        font-size: 13px;
        line-height: 1;
        white-space: nowrap;
      }

      button:active {
        transform: translateY(1px);
      }

      .iconBtn {
        padding: 9px 10px;
        min-width: 40px;
        text-align: center;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding-bottom: calc(var(--dock-h) + env(safe-area-inset-bottom));
      }

      #chart {
        flex: 1;
        min-height: 0;
      }

      :root {
        --dock-h: 64px;
      }

      .dock {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
        border-top: 1px solid var(--border);
        background: rgba(16, 26, 47, 0.92);
        padding: 10px 10px calc(env(safe-area-inset-bottom) + 10px);
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        align-items: center;
        min-height: var(--dock-h);
        box-sizing: border-box;
      }

      .dockLeft {
        display: flex;
        gap: 8px;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .dockLeft::-webkit-scrollbar {
        display: none;
      }

      .dockCenter {
        display: flex;
        justify-content: center;
      }

      .dockRight {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      /* Floating controls (thumb-friendly) */
      .fab {
        position: fixed;
        right: 12px;
        bottom: calc(env(safe-area-inset-bottom) + var(--dock-h) + 12px);
        z-index: 30;
        display: grid;
        gap: 10px;
      }

      .fab button {
        border-radius: 999px;
        padding: 12px 14px;
        background: rgba(16, 26, 47, 0.92);
        backdrop-filter: blur(10px);
      }

      /* Drawer */
      .drawerBack {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: rgba(0, 0, 0, 0.55);
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .drawerBack.open {
        opacity: 1;
        pointer-events: auto;
      }

      .drawer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 60;
        background: var(--panel);
        border-top: 1px solid var(--border);
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
        transform: translateY(105%);
        transition: transform 200ms ease;
        max-height: min(78dvh, 720px);
        display: flex;
        flex-direction: column;
      }

      .drawer.open {
        transform: translateY(0);
      }

      .drawerHd {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .pill {
        width: 42px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        margin: 2px auto 0;
      }

      .drawerTitle {
        font-weight: 650;
        font-size: 13px;
      }

      .muted {
        color: var(--muted);
        font-size: 12px;
      }

      .drawerBd {
        padding: 10px 12px 12px;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        outline: none;
        font-size: 14px;
      }

      input[type="text"]::placeholder {
        color: rgba(230, 237, 247, 0.55);
      }

      .list {
        flex: 1;
        min-height: 140px;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
      }

      .item {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 11px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .item:last-child {
        border-bottom: 0;
      }

      .item label {
        cursor: pointer;
        user-select: none;
        line-height: 1.1;
        font-size: 14px;
      }

      .drawerActions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .danger {
        border-color: rgba(255, 107, 107, 0.35);
        background: rgba(255, 107, 107, 0.1);
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.3;
      }

      .seg {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .seg button[data-active="true"] {
        border-color: rgba(122, 162, 255, 0.6);
        background: rgba(122, 162, 255, 0.14);
      }

      .toast {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: calc(env(safe-area-inset-bottom) + var(--dock-h) + 12px);
        z-index: 80;
        pointer-events: none;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 140ms ease, transform 140ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast .card {
        background: rgba(16, 26, 47, 0.92);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px 12px;
        backdrop-filter: blur(10px);
        font-size: 14px;
        line-height: 1.2;
        display: flex;
        gap: 10px;
        align-items: baseline;
        justify-content: space-between;
      }

      .toast .card .muted {
        font-size: 12px;
      }

      /* Short screens: keep controls compact */
      @media (max-height: 520px) {
        :root { --dock-h: 56px; }
        button { padding: 8px 9px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="main">
        <div id="chart"></div>
      </div>
    </div>

    <div class="dock" aria-label="Управление графиком">
      <div class="dockLeft seg" id="windowButtons" aria-label="Период">
        <button type="button" data-window="1m">1м</button>
        <button type="button" data-window="3m">3м</button>
        <button type="button" data-window="6m" data-active="true">6м</button>
        <button type="button" data-window="1y">1г</button>
        <button type="button" data-window="5y">5л</button>
        <button type="button" data-window="all">Все</button>
      </div>
      <div class="dockCenter">
        <button id="openDrawerBtn" type="button" title="Партии и настройки">Партии</button>
      </div>
      <div class="dockRight seg" aria-label="Масштаб по оси Y">
        <button id="xZoomOutBtn" type="button" title="Показать больше времени">⤢</button>
        <button id="xZoomInBtn" type="button" title="Показать меньше времени">⤡</button>
        <button id="yZoomOutBtn" type="button" title="Увеличить диапазон Y (показать выше/ниже)">Y−</button>
        <button id="yZoomInBtn" type="button" title="Уменьшить диапазон Y (сжать по вертикали)">Y+</button>
      </div>
    </div>

    <div id="toast" class="toast" aria-live="polite" aria-atomic="true">
      <div class="card">
        <div id="toastLeft">—</div>
        <div id="toastRight" class="muted">—</div>
      </div>
    </div>

    <div id="drawerBack" class="drawerBack" aria-hidden="true"></div>
    <div id="drawer" class="drawer" role="dialog" aria-modal="true" aria-label="Партии и настройки">
      <div class="pill"></div>
      <div class="drawerHd">
        <div class="drawerTitle">Партии</div>
        <div class="grow"></div>
        <button id="closeDrawerBtn" class="iconBtn" title="Закрыть">✕</button>
      </div>
      <div class="drawerBd">
        <input id="search" type="text" placeholder="Поиск по названию..." />
        <div class="muted">Отмеченные партии — яркие, остальные — полупрозрачные.</div>
        <div id="partyList" class="list"></div>
        <div class="drawerActions">
          <button id="yFitBtn" title="Подогнать Y под видимый X-диапазон">Y Fit</button>
          <button id="yAutoBtn" title="Автоматический масштаб Y">Y Auto</button>
          <button id="resetViewBtn" class="danger" title="Сбросить масштаб и выделения">Сброс</button>
        </div>
        <div class="hint">Подсказка: можно зумить двумя пальцами и перетаскивать одним.</div>
      </div>
    </div>

    <div class="fab" aria-hidden="true">
      <button id="resetFab" title="Сброс">Сброс</button>
    </div>

    <script>
      const payload = window.POLITICAL_PARTIES_PAYLOAD;
      if (!payload) {
        document.body.innerHTML =
          '<div style="padding:16px;font-family:system-ui;color:#fff">Не найден файл данных <code>political_parties_payload.js</code>.</div>';
        throw new Error("POLITICAL_PARTIES_PAYLOAD missing");
      }

      function telegramInit() {
        try {
          const t = window.Telegram && window.Telegram.WebApp;
          if (!t) return;
          t.expand();
          if (t.setHeaderColor) t.setHeaderColor("#101a2f");
          if (t.setBackgroundColor) t.setBackgroundColor("#0b1220");
        } catch {}
      }

      function initWhenPlotlyReady() {
        if (!window.Plotly) {
          setTimeout(initWhenPlotlyReady, 50);
          return;
        }
        init();
      }

      function init() {
        telegramInit();

        const dates = payload.dates;
        const _excluded = [
          "Затрудняюсь ответить",
          "Не стал бы участвовать в выборах",
          "Приду и испорчу бюллетень",
        ];
        const partyNames = Object.keys(payload.series).filter((name) => {
          const n = String(name || "").trim();
          if (!n) return false;
          const low = n.toLowerCase();
          if (_excluded.includes(n)) return false;
          if (low.includes("затрудняюсь")) return false;
          if (low.includes("не стал бы")) return false;
          if (low.includes("испорчу")) return false;
          if (low.includes("бюллет")) return false;
          return true;
        });

        const traces = partyNames.map((name) => ({
          type: "scatter",
          mode: "lines+markers",
          name,
          x: dates,
          y: payload.series[name],
          connectgaps: false,
          line: { width: 2 },
          marker: { size: 5 },
          opacity: 1,
          hovertemplate: "%{x}<br>%{fullData.name}: %{y}%<extra></extra>",
        }));

        const layout = {
          paper_bgcolor: "rgba(0,0,0,0)",
          plot_bgcolor: "rgba(0,0,0,0)",
          dragmode: "pan",
          hovermode: "closest",
          margin: { l: 54, r: 14, t: 10, b: 74 },
          xaxis: {
            type: "date",
            showgrid: true,
            gridcolor: "rgba(255,255,255,.08)",
            zeroline: false,
            rangeslider: { visible: false },
            fixedrange: false,
          },
          yaxis: {
            title: "{% от опрошенных}",
            range: [-2, 60],
            showgrid: true,
            gridcolor: "rgba(255,255,255,.08)",
            rangemode: "tozero",
            zeroline: false,
            fixedrange: false,
          },
          legend: {
            orientation: "h",
            y: 1.02,
            x: 0,
            font: { color: "#e6edf7" },
          },
          font: { color: "#e6edf7" },
          showlegend: false,
        };

        const config = {
          responsive: true,
          scrollZoom: true,
          displaylogo: false,
          displayModeBar: false,
          doubleClick: "reset",
          showTips: false,
        };

        const chartDiv = document.getElementById("chart");
        Plotly.newPlot(chartDiv, traces, layout, config);

        // Initial view: last 6 months (closest available dates)
        function isoToDate(s) {
          const d = new Date(String(s) + "T00:00:00Z");
          return Number.isFinite(d.getTime()) ? d : null;
        }

        function toIso(d) {
          const y = d.getUTCFullYear();
          const m = String(d.getUTCMonth() + 1).padStart(2, "0");
          const dd = String(d.getUTCDate()).padStart(2, "0");
          return `${y}-${m}-${dd}`;
        }

        function clamp(n, a, b) {
          return Math.max(a, Math.min(b, n));
        }

        const minDate = dates[0];
        const maxDate = dates[dates.length - 1];

        function rightPadDays() {
          // Empty space to the right, so the latest values can be centered.
          // Slightly depends on the current window so it doesn't look too пусто on short ranges.
          if (activeWindow === "1m") return 45;
          if (activeWindow === "3m") return 75;
          if (activeWindow === "6m") return 120;
          if (activeWindow === "1y") return 160;
          if (activeWindow === "5y") return 220;
          return 260;
        }

        function addDaysIso(iso, days) {
          const d = isoToDate(iso);
          if (!d) return iso;
          const next = new Date(d.getTime() + days * 24 * 3600 * 1000);
          return toIso(next);
        }

        function findIndexAtOrAfter(iso) {
          for (let i = 0; i < dates.length; i++) if (dates[i] >= iso) return i;
          return dates.length - 1;
        }

        let activeWindow = "6m";

        function windowToDays(win) {
          if (win === "1m") return 31;
          if (win === "3m") return 93;
          if (win === "6m") return 186;
          if (win === "1y") return 366;
          if (win === "5y") return 365 * 5 + 2;
          return null;
        }

        function applyXWindow(win) {
          const endIso = maxDate;
          if (win === "all") {
            const endPad = addDaysIso(endIso, rightPadDays());
            Plotly.relayout(chartDiv, { "xaxis.range": [minDate, endPad] });
            return;
          }
          const endD = isoToDate(endIso);
          if (!endD) return;
          const days = windowToDays(win) ?? 186;
          const startD = new Date(endD.getTime() - days * 24 * 3600 * 1000);
          const startIso = toIso(startD);
          const startIdx = findIndexAtOrAfter(startIso);
          const endPad = addDaysIso(endIso, rightPadDays());
          Plotly.relayout(chartDiv, { "xaxis.range": [dates[startIdx], endPad] });
        }

        function syncWindowButtons() {
          const buttons = document.getElementById("windowButtons");
          for (const b of buttons.querySelectorAll("button[data-window]")) {
            b.dataset.active = b.dataset.window === activeWindow ? "true" : "false";
          }
        }

        syncWindowButtons();
        applyXWindow(activeWindow);

        // Discrete Y zoom controls (range input lags on some phones)
        let yMaxValue = 60;
        function applyYRange() {
          const yMax = clamp(Number(yMaxValue || 60), 10, 100);
          yMaxValue = yMax;
          Plotly.relayout(chartDiv, { "yaxis.range": [-2, yMax], "yaxis.autorange": false });
        }
        applyYRange();

        function yAuto() {
          yMaxValue = 60;
          applyYRange();
        }

        // Keep chart within sane bounds even after pinch/pan
        let _clampBusy = false;
        function clampRanges() {
          if (_clampBusy) return;
          const xr = chartDiv?._fullLayout?.xaxis?.range;
          const yr = chartDiv?._fullLayout?.yaxis?.range;
          if (!xr || xr.length !== 2 || !yr || yr.length !== 2) return;
          const x0 = String(xr[0]).slice(0, 10);
          const x1 = String(xr[1]).slice(0, 10);
          const lo = x0 <= x1 ? x0 : x1;
          const hi = x0 <= x1 ? x1 : x0;
          const y0 = Number(yr[0]);
          const y1 = Number(yr[1]);

          const next = {};
          let changed = false;

          let nLo = lo < minDate ? minDate : lo;
          // Allow panning to the right of the last known date (empty space),
          // but keep a reasonable cap so it's still hard to get "lost".
          const maxPadIso = addDaysIso(maxDate, rightPadDays());
          let nHi = hi > maxPadIso ? maxPadIso : hi;
          if (nLo > nHi) {
            nLo = minDate;
            nHi = maxPadIso;
          }
          if (nLo !== lo || nHi !== hi) {
            next["xaxis.range"] = [nLo, nHi];
            changed = true;
          }

          let nY0 = Number.isFinite(y0) ? y0 : -2;
          let nY1 = Number.isFinite(y1) ? y1 : 60;
          nY0 = clamp(nY0, -5, 98);
          nY1 = clamp(nY1, 2, 100);
          if (nY1 <= nY0 + 1) nY1 = clamp(nY0 + 2, 2, 100);
          if (nY0 !== y0 || nY1 !== y1) {
            next["yaxis.range"] = [nY0, nY1];
            next["yaxis.autorange"] = false;
            changed = true;
          }

          if (!changed) return;
          _clampBusy = true;
          Plotly.relayout(chartDiv, next).finally(() => (_clampBusy = false));
        }

        let _clampTimer = null;
        chartDiv.on("plotly_relayout", () => {
          if (_clampTimer) clearTimeout(_clampTimer);
          _clampTimer = setTimeout(() => clampRanges(), 120);
        });

        // Selection UI
        const partyList = document.getElementById("partyList");
        const selected = new Set();

        function renderPartyList(filterText) {
          const f = (filterText || "").trim().toLowerCase();
          partyList.innerHTML = "";
          for (const name of partyNames) {
            if (f && !name.toLowerCase().includes(f)) continue;
            const id = "p_" + name.replace(/\\W+/g, "_");
            const row = document.createElement("div");
            row.className = "item";
            row.innerHTML = `
              <input type="checkbox" id="${id}" ${selected.has(name) ? "checked" : ""} />
              <label for="${id}">${name}</label>
            `;
            row.querySelector("input").addEventListener("change", (e) => {
              if (e.target.checked) selected.add(name);
              else selected.delete(name);
              applySelection();
            });
            partyList.appendChild(row);
          }
        }

        function applySelection() {
          const has = selected.size > 0;
          const opacities = partyNames.map((n) => (has ? (selected.has(n) ? 1 : 0.15) : 1));
          const widths = partyNames.map((n) => (has ? (selected.has(n) ? 3 : 1) : 2));
          const markerSizes = partyNames.map((n) => (has ? (selected.has(n) ? 6 : 4) : 5));
          Plotly.restyle(chartDiv, {
            opacity: opacities,
            "line.width": widths,
            "marker.size": markerSizes,
          });
        }

        function yFit() {
          const xr = chartDiv?._fullLayout?.xaxis?.range;
          const r0 = xr?.[0] ? String(xr[0]).slice(0, 10) : null;
          const r1 = xr?.[1] ? String(xr[1]).slice(0, 10) : null;
          const [x0, x1] = r0 && r1 ? [r0, r1] : [dates[0], dates[dates.length - 1]];
          const lo = x0 <= x1 ? x0 : x1;
          const hi = x0 <= x1 ? x1 : x0;

          const names = selected.size > 0 ? Array.from(selected) : partyNames;
          let maxY = null;
          for (let i = 0; i < dates.length; i++) {
            const d = dates[i];
            if (d < lo || d > hi) continue;
            for (const n of names) {
              const v = payload.series[n][i];
              if (v === null || v === undefined) continue;
              const num = Number(v);
              if (!Number.isFinite(num)) continue;
              if (maxY === null || num > maxY) maxY = num;
            }
          }

          if (maxY === null) return yAuto();
          let padded = maxY * 1.08;
          const step = padded <= 10 ? 0.5 : 1.0;
          padded = Math.ceil(padded / step) * step;
          padded = clamp(Math.max(1, padded), 10, 100);
          yMaxValue = padded;
          applyYRange();
          return;
        }

        // Drawer behavior
        const drawer = document.getElementById("drawer");
        const drawerBack = document.getElementById("drawerBack");
        function openDrawer() {
          drawerBack.classList.add("open");
          drawer.classList.add("open");
          drawerBack.setAttribute("aria-hidden", "false");
        }
        function closeDrawer() {
          drawerBack.classList.remove("open");
          drawer.classList.remove("open");
          drawerBack.setAttribute("aria-hidden", "true");
        }

        document.getElementById("openDrawerBtn").addEventListener("click", openDrawer);
        document.getElementById("closeDrawerBtn").addEventListener("click", closeDrawer);
        drawerBack.addEventListener("click", closeDrawer);

        document.getElementById("search").addEventListener("input", (e) => renderPartyList(e.target.value));
        document.getElementById("yAutoBtn").addEventListener("click", () => {
          yAuto();
        });
        document.getElementById("yFitBtn").addEventListener("click", yFit);

        async function resetAll() {
          selected.clear();
          renderPartyList(document.getElementById("search").value);
          applySelection();
          activeWindow = "6m";
          syncWindowButtons();
          applyXWindow(activeWindow);
          yAuto();
          await Plotly.relayout(chartDiv, {});
          clampRanges();
          closeDrawer();
        }

        document.getElementById("resetViewBtn").addEventListener("click", resetAll);
        document.getElementById("resetFab").addEventListener("click", resetAll);

        // Window buttons (quick zoom to latest period)
        document.getElementById("windowButtons").addEventListener("click", (e) => {
          const btn = e.target?.closest?.("button[data-window]");
          if (!btn) return;
          activeWindow = btn.dataset.window;
          syncWindowButtons();
          applyXWindow(activeWindow);
        });

        document.getElementById("yZoomOutBtn").addEventListener("click", () => {
          yMaxValue = clamp(yMaxValue * 1.25, 10, 100);
          applyYRange();
        });
        document.getElementById("yZoomInBtn").addEventListener("click", () => {
          yMaxValue = clamp(yMaxValue / 1.25, 10, 100);
          applyYRange();
        });

        // Discrete time zoom (in addition to pinch-zoom)
        function daysBetween(aIso, bIso) {
          const a = isoToDate(aIso);
          const b = isoToDate(bIso);
          if (!a || !b) return null;
          return Math.abs((b.getTime() - a.getTime()) / (24 * 3600 * 1000));
        }

        function setTimeSpanDays(spanDays) {
          const endIso = maxDate;
          const endPad = addDaysIso(endIso, rightPadDays());
          const endD = isoToDate(endIso);
          if (!endD) return;
          spanDays = clamp(spanDays, 20, 365 * 10);
          const startD = new Date(endD.getTime() - spanDays * 24 * 3600 * 1000);
          const startIso = toIso(startD);
          const startIdx = findIndexAtOrAfter(startIso);
          Plotly.relayout(chartDiv, { "xaxis.range": [dates[startIdx], endPad] });
        }

        document.getElementById("xZoomInBtn").addEventListener("click", () => {
          const r = chartDiv?._fullLayout?.xaxis?.range;
          const a = r?.[0] ? String(r[0]).slice(0, 10) : null;
          const b = r?.[1] ? String(r[1]).slice(0, 10) : null;
          if (!a || !b) return setTimeSpanDays(186 / 1.25);
          const span = daysBetween(a, maxDate) ?? 186;
          setTimeSpanDays(span / 1.25);
        });

        document.getElementById("xZoomOutBtn").addEventListener("click", () => {
          const r = chartDiv?._fullLayout?.xaxis?.range;
          const a = r?.[0] ? String(r[0]).slice(0, 10) : null;
          const b = r?.[1] ? String(r[1]).slice(0, 10) : null;
          if (!a || !b) return setTimeSpanDays(186 * 1.25);
          const span = daysBetween(a, maxDate) ?? 186;
          setTimeSpanDays(span * 1.25);
        });

        // Click handler: show a small toast (no redundant labels)
        let _toastTimer = null;
        function showToast(left, right) {
          const el = document.getElementById("toast");
          document.getElementById("toastLeft").textContent = left;
          document.getElementById("toastRight").textContent = right;
          el.classList.add("show");
          if (_toastTimer) clearTimeout(_toastTimer);
          _toastTimer = setTimeout(() => el.classList.remove("show"), 2400);
        }

        chartDiv.on("plotly_click", (ev) => {
          const p = ev?.points?.[0];
          if (!p) return;
          const name = p.fullData?.name ?? "—";
          const d = p.x ?? "—";
          const value = p.y === null || p.y === undefined ? "—" : String(p.y);
          showToast(`${name} — ${value}%`, String(d));
        });

        renderPartyList("");

        // Initial resize for Telegram WebView oddities
        setTimeout(() => Plotly.Plots.resize(chartDiv), 50);
        window.addEventListener("resize", () => Plotly.Plots.resize(chartDiv));
      }

      initWhenPlotlyReady();
    </script>
  </body>
</html>

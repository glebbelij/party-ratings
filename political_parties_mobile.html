<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Рейтинги политических партий — mobile</title>
    <script src="plotly-2.30.0.min.js" onerror="(function(){var s=document.createElement('script');s.src='https://cdn.plot.ly/plotly-2.30.0.min.js';document.head.appendChild(s);})();"></script>
    <script src="political_parties_payload.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1220;
        --panel: #101a2f;
        --text: #e6edf7;
        --muted: #9bb0d0;
        --border: rgba(255, 255, 255, 0.12);
        --accent: #7aa2ff;
        --danger: #ff6b6b;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
      }

      .app {
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: linear-gradient(180deg, rgba(16, 26, 47, 0.98), rgba(16, 26, 47, 0.92));
        border-bottom: 1px solid var(--border);
        padding: calc(env(safe-area-inset-top) + 10px) 12px 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      header h1 {
        margin: 0;
        font-size: 13px;
        font-weight: 650;
        letter-spacing: 0.2px;
        line-height: 1.1;
      }

      .grow {
        flex: 1;
      }

      button {
        -webkit-tap-highlight-color: transparent;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 12px;
        padding: 9px 10px;
        cursor: pointer;
        font-size: 13px;
        line-height: 1;
        white-space: nowrap;
      }

      button:active {
        transform: translateY(1px);
      }

      .iconBtn {
        padding: 9px 10px;
        min-width: 40px;
        text-align: center;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      #chart {
        flex: 1;
        min-height: 0;
      }

      .bottomBar {
        border-top: 1px solid var(--border);
        background: rgba(16, 26, 47, 0.92);
        padding: 10px 12px calc(env(safe-area-inset-bottom) + 10px);
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .bottomBar .row {
        display: grid;
        grid-template-columns: 60px 1fr;
        gap: 10px;
        font-size: 13px;
        align-items: baseline;
      }

      .k {
        color: var(--muted);
      }

      .v {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Floating controls (thumb-friendly) */
      .fab {
        position: fixed;
        right: 12px;
        bottom: calc(env(safe-area-inset-bottom) + 96px);
        z-index: 30;
        display: grid;
        gap: 10px;
      }

      .fab button {
        border-radius: 999px;
        padding: 12px 14px;
        background: rgba(16, 26, 47, 0.92);
        backdrop-filter: blur(10px);
      }

      /* Drawer */
      .drawerBack {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: rgba(0, 0, 0, 0.55);
        opacity: 0;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .drawerBack.open {
        opacity: 1;
        pointer-events: auto;
      }

      .drawer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 60;
        background: var(--panel);
        border-top: 1px solid var(--border);
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
        transform: translateY(105%);
        transition: transform 200ms ease;
        max-height: min(78dvh, 720px);
        display: flex;
        flex-direction: column;
      }

      .drawer.open {
        transform: translateY(0);
      }

      .drawerHd {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .pill {
        width: 42px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        margin: 2px auto 0;
      }

      .drawerTitle {
        font-weight: 650;
        font-size: 13px;
      }

      .muted {
        color: var(--muted);
        font-size: 12px;
      }

      .drawerBd {
        padding: 10px 12px 12px;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        outline: none;
        font-size: 14px;
      }

      input[type="text"]::placeholder {
        color: rgba(230, 237, 247, 0.55);
      }

      .list {
        flex: 1;
        min-height: 140px;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
      }

      .item {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 11px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .item:last-child {
        border-bottom: 0;
      }

      .item label {
        cursor: pointer;
        user-select: none;
        line-height: 1.1;
        font-size: 14px;
      }

      .drawerActions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .danger {
        border-color: rgba(255, 107, 107, 0.35);
        background: rgba(255, 107, 107, 0.1);
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.3;
      }

      /* Landscape: prefer full chart, shorter bars */
      @media (orientation: landscape) and (max-height: 520px) {
        header {
          padding-top: calc(env(safe-area-inset-top) + 8px);
          padding-bottom: 8px;
        }
        .bottomBar {
          padding-top: 8px;
          padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
        }
        .fab {
          bottom: calc(env(safe-area-inset-bottom) + 76px);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Рейтинги партий</h1>
        <div class="grow"></div>
        <button id="openDrawerBtn" class="iconBtn" title="Партии и настройки">Партии</button>
        <button id="rotateBtn" class="iconBtn" title="Попробовать включить горизонтальный режим">↔</button>
      </header>

      <div class="main">
        <div id="chart"></div>
      </div>

      <div class="bottomBar">
        <div class="row"><div class="k">Партия</div><div id="clickedParty" class="v">—</div></div>
        <div class="row"><div class="k">Дата</div><div id="clickedDate" class="v">—</div></div>
        <div class="row"><div class="k">Значение</div><div id="clickedValue" class="v">—</div></div>
      </div>
    </div>

    <div id="drawerBack" class="drawerBack" aria-hidden="true"></div>
    <div id="drawer" class="drawer" role="dialog" aria-modal="true" aria-label="Партии и настройки">
      <div class="pill"></div>
      <div class="drawerHd">
        <div class="drawerTitle">Партии</div>
        <div class="grow"></div>
        <button id="closeDrawerBtn" class="iconBtn" title="Закрыть">✕</button>
      </div>
      <div class="drawerBd">
        <input id="search" type="text" placeholder="Поиск по названию..." />
        <div class="muted">Отмеченные партии — яркие, остальные — полупрозрачные.</div>
        <div id="partyList" class="list"></div>
        <div class="drawerActions">
          <button id="yZoomOutBtn" title="Увеличить диапазон Y (показать выше/ниже)">Y−</button>
          <button id="yZoomInBtn" title="Уменьшить диапазон Y (сжать по вертикали)">Y+</button>
          <button id="yFitBtn" title="Подогнать Y под видимый X-диапазон">Y Fit</button>
          <button id="yAutoBtn" title="Автоматический масштаб Y">Y Auto</button>
          <button id="resetViewBtn" class="danger" title="Сбросить масштаб и выделения">Сброс</button>
        </div>
        <div class="hint">
          Подсказка: на телефоне удобнее открыть в горизонтальном режиме. Кнопка ↔ попробует включить его,
          но некоторые браузеры запрещают принудительный поворот.
        </div>
      </div>
    </div>

    <div class="fab" aria-hidden="true">
      <button id="yFitFab" title="Y Fit">Y Fit</button>
      <button id="resetFab" title="Сброс">Сброс</button>
    </div>

    <script>
      const payload = window.POLITICAL_PARTIES_PAYLOAD;
      if (!payload) {
        document.body.innerHTML =
          '<div style="padding:16px;font-family:system-ui;color:#fff">Не найден файл данных <code>political_parties_payload.js</code>.</div>';
        throw new Error("POLITICAL_PARTIES_PAYLOAD missing");
      }

      function telegramInit() {
        try {
          const t = window.Telegram && window.Telegram.WebApp;
          if (!t) return;
          t.expand();
          if (t.setHeaderColor) t.setHeaderColor("#101a2f");
          if (t.setBackgroundColor) t.setBackgroundColor("#0b1220");
        } catch {}
      }

      async function requestLandscape() {
        try {
          if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock("landscape");
            return true;
          }
        } catch {}
        return false;
      }

      function initWhenPlotlyReady() {
        if (!window.Plotly) {
          setTimeout(initWhenPlotlyReady, 50);
          return;
        }
        init();
      }

      function init() {
        telegramInit();

        const dates = payload.dates;
        const partyNames = Object.keys(payload.series);

        const traces = partyNames.map((name) => ({
          type: "scatter",
          mode: "lines+markers",
          name,
          x: dates,
          y: payload.series[name],
          connectgaps: false,
          line: { width: 2 },
          marker: { size: 5 },
          opacity: 1,
          hovertemplate: "%{x}<br>%{fullData.name}: %{y}%<extra></extra>",
        }));

        const layout = {
          paper_bgcolor: "rgba(0,0,0,0)",
          plot_bgcolor: "rgba(0,0,0,0)",
          dragmode: "pan",
          hovermode: "closest",
          margin: { l: 54, r: 14, t: 10, b: 44 },
          xaxis: {
            type: "date",
            showgrid: true,
            gridcolor: "rgba(255,255,255,.08)",
            zeroline: false,
            rangeslider: { visible: true, thickness: 0.1 },
          },
          yaxis: {
            title: "{% от опрошенных}",
            showgrid: true,
            gridcolor: "rgba(255,255,255,.08)",
            rangemode: "tozero",
            zeroline: false,
            fixedrange: false,
          },
          legend: {
            orientation: "h",
            y: 1.02,
            x: 0,
            font: { color: "#e6edf7" },
          },
          font: { color: "#e6edf7" },
        };

        const config = {
          responsive: true,
          scrollZoom: true,
          displaylogo: false,
        };

        const chartDiv = document.getElementById("chart");
        Plotly.newPlot(chartDiv, traces, layout, config);

        // Selection UI
        const partyList = document.getElementById("partyList");
        const selected = new Set();

        function renderPartyList(filterText) {
          const f = (filterText || "").trim().toLowerCase();
          partyList.innerHTML = "";
          for (const name of partyNames) {
            if (f && !name.toLowerCase().includes(f)) continue;
            const id = "p_" + name.replace(/\\W+/g, "_");
            const row = document.createElement("div");
            row.className = "item";
            row.innerHTML = `
              <input type="checkbox" id="${id}" ${selected.has(name) ? "checked" : ""} />
              <label for="${id}">${name}</label>
            `;
            row.querySelector("input").addEventListener("change", (e) => {
              if (e.target.checked) selected.add(name);
              else selected.delete(name);
              applySelection();
            });
            partyList.appendChild(row);
          }
        }

        function applySelection() {
          const has = selected.size > 0;
          const opacities = partyNames.map((n) => (has ? (selected.has(n) ? 1 : 0.15) : 1));
          const widths = partyNames.map((n) => (has ? (selected.has(n) ? 3 : 1) : 2));
          const markerSizes = partyNames.map((n) => (has ? (selected.has(n) ? 6 : 4) : 5));
          Plotly.restyle(chartDiv, {
            opacity: opacities,
            "line.width": widths,
            "marker.size": markerSizes,
          });
        }

        function _fullXRange() {
          const r = chartDiv?._fullLayout?.xaxis?.range;
          if (!r || r.length !== 2) return null;
          const a = String(r[0]).slice(0, 10);
          const b = String(r[1]).slice(0, 10);
          if (a.length !== 10 || b.length !== 10) return null;
          return [a, b];
        }

        function yAuto() {
          return Plotly.relayout(chartDiv, { "yaxis.autorange": true });
        }

        function yZoom(factor) {
          const yr = chartDiv?._fullLayout?.yaxis?.range;
          if (!yr || yr.length !== 2) return yAuto();
          const curMax = Number(yr[1]);
          if (!Number.isFinite(curMax) || curMax <= 0) return yAuto();
          const nextMax = Math.max(1, curMax * factor);
          return Plotly.relayout(chartDiv, { "yaxis.range": [0, nextMax], "yaxis.autorange": false });
        }

        function yFit() {
          const xr = _fullXRange();
          const [x0, x1] = xr ?? [dates[0], dates[dates.length - 1]];
          const lo = x0 <= x1 ? x0 : x1;
          const hi = x0 <= x1 ? x1 : x0;

          const names = selected.size > 0 ? Array.from(selected) : partyNames;
          let maxY = null;
          for (let i = 0; i < dates.length; i++) {
            const d = dates[i];
            if (d < lo || d > hi) continue;
            for (const n of names) {
              const v = payload.series[n][i];
              if (v === null || v === undefined) continue;
              const num = Number(v);
              if (!Number.isFinite(num)) continue;
              if (maxY === null || num > maxY) maxY = num;
            }
          }

          if (maxY === null) return yAuto();
          let padded = maxY * 1.08;
          const step = padded <= 10 ? 0.5 : 1.0;
          padded = Math.ceil(padded / step) * step;
          padded = Math.max(1, padded);
          return Plotly.relayout(chartDiv, { "yaxis.range": [0, padded], "yaxis.autorange": false });
        }

        // Drawer behavior
        const drawer = document.getElementById("drawer");
        const drawerBack = document.getElementById("drawerBack");
        function openDrawer() {
          drawerBack.classList.add("open");
          drawer.classList.add("open");
          drawerBack.setAttribute("aria-hidden", "false");
        }
        function closeDrawer() {
          drawerBack.classList.remove("open");
          drawer.classList.remove("open");
          drawerBack.setAttribute("aria-hidden", "true");
        }

        document.getElementById("openDrawerBtn").addEventListener("click", openDrawer);
        document.getElementById("closeDrawerBtn").addEventListener("click", closeDrawer);
        drawerBack.addEventListener("click", closeDrawer);

        document.getElementById("search").addEventListener("input", (e) => renderPartyList(e.target.value));
        document.getElementById("yAutoBtn").addEventListener("click", yAuto);
        document.getElementById("yFitBtn").addEventListener("click", yFit);
        document.getElementById("yZoomOutBtn").addEventListener("click", () => yZoom(1.25));
        document.getElementById("yZoomInBtn").addEventListener("click", () => yZoom(1 / 1.25));

        async function resetAll() {
          selected.clear();
          renderPartyList(document.getElementById("search").value);
          applySelection();
          await Plotly.relayout(chartDiv, { "xaxis.autorange": true, "yaxis.autorange": true });
        }

        document.getElementById("resetViewBtn").addEventListener("click", resetAll);
        document.getElementById("resetFab").addEventListener("click", resetAll);
        document.getElementById("yFitFab").addEventListener("click", yFit);

        document.getElementById("rotateBtn").addEventListener("click", async () => {
          await requestLandscape();
        });

        // Click handler: show exact point value
        chartDiv.on("plotly_click", (ev) => {
          const p = ev?.points?.[0];
          if (!p) return;
          document.getElementById("clickedParty").textContent = p.fullData?.name ?? "—";
          document.getElementById("clickedDate").textContent = p.x ?? "—";
          document.getElementById("clickedValue").textContent = p.y === null || p.y === undefined ? "—" : String(p.y);
        });

        renderPartyList("");

        // Initial resize for Telegram WebView oddities
        setTimeout(() => Plotly.Plots.resize(chartDiv), 50);
        window.addEventListener("resize", () => Plotly.Plots.resize(chartDiv));
      }

      initWhenPlotlyReady();
    </script>
  </body>
</html>
